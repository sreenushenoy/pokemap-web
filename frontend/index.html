<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PokéMap Route Builder</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css"/>
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:      #0d1117;
    --surface: #161b22;
    --card:    #1c2230;
    --border:  #30363d;
    --accent:  #e63946;
    --blue:    #58a6ff;
    --text:    #e6edf3;
    --muted:   #8b949e;
    --green:   #3fb950;
    --yellow:  #d29922;
    --purple:  #bc8cff;
    --radius:  10px;
  }

  body {
    font-family: 'Inter', system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100dvh;
    display: grid;
    grid-template-rows: 56px 1fr;
    overflow: hidden;
  }

  /* ── Header ── */
  header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 0 16px;
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .logo {
    font-size: 15px;
    font-weight: 700;
    white-space: nowrap;
    display: flex;
    align-items: center;
    gap: 7px;
    flex-shrink: 0;
  }
  .logo-icon {
    width: 26px; height: 26px;
    background: var(--accent);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 14px;
  }
  .logo span { color: var(--accent); }

  .city-tabs {
    display: flex;
    gap: 3px;
    overflow-x: auto;
    scrollbar-width: none;
    flex: 1;
  }
  .city-tabs::-webkit-scrollbar { display: none; }

  .city-tab {
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 5px 10px;
    border-radius: 8px;
    cursor: pointer;
    border: 1px solid transparent;
    background: none;
    color: var(--muted);
    font-size: 11px;
    font-family: inherit;
    white-space: nowrap;
    transition: all .15s;
    line-height: 1.3;
    min-width: 60px;
    -webkit-tap-highlight-color: transparent;
  }
  .city-tab .flag { font-size: 18px; line-height: 1; }
  .city-tab .city-name { font-weight: 500; margin-top: 2px; }
  .city-tab .reset { font-size: 9px; margin-top: 1px; opacity: .7; }
  .city-tab:hover { background: var(--card); color: var(--text); }
  .city-tab.active { background: var(--card); border-color: var(--accent); color: var(--text); }
  .city-tab .reset.soon { color: var(--green); opacity: 1; }
  .city-tab .reset.very-soon { color: var(--yellow); opacity: 1; }

  /* ── Layout ── */
  .main { display: grid; grid-template-columns: 310px 1fr; overflow: hidden; height: 100%; }

  /* ── Sidebar ── */
  .sidebar {
    background: var(--surface);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  .drawer-handle { display: none; }

  .sidebar-section { padding: 12px 14px; border-bottom: 1px solid var(--border); }
  .section-title {
    font-size: 10px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: .08em;
    color: var(--muted);
    margin-bottom: 9px;
  }

  /* ── Group tabs ── */
  .group-tabs { display: flex; gap: 5px; flex-wrap: wrap; }
  .group-tab {
    display: flex;
    align-items: center;
    gap: 5px;
    padding: 6px 11px;
    border-radius: 20px;
    border: 1px solid var(--border);
    background: var(--card);
    color: var(--muted);
    font-size: 12px;
    font-family: inherit;
    font-weight: 500;
    cursor: pointer;
    transition: all .15s;
    -webkit-tap-highlight-color: transparent;
  }
  .group-tab .g-img { width: 20px; height: 20px; object-fit: contain; flex-shrink: 0; image-rendering: -webkit-optimize-contrast; }
  .group-tab:hover { border-color: var(--blue); color: var(--text); }
  .group-tab.active { border-color: var(--accent); color: var(--text); background: #1f1218; }

  /* ── Filter pills ── */
  .filter-pills {
    display: flex;
    gap: 5px;
    flex-wrap: wrap;
    margin-top: 9px;
    max-height: 140px;
    overflow-y: auto;
    scrollbar-width: thin;
    scrollbar-color: var(--border) transparent;
  }
  .filter-pill {
    display: flex;
    align-items: center;
    gap: 4px;
    padding: 5px 10px 5px 6px;
    border-radius: 20px;
    border: 1px solid var(--border);
    background: var(--card);
    color: var(--muted);
    font-size: 11px;
    font-family: inherit;
    cursor: pointer;
    transition: all .15s;
    white-space: nowrap;
    -webkit-tap-highlight-color: transparent;
  }
  .filter-pill img { width: 22px; height: 22px; object-fit: contain; border-radius: 50%; background: #0d1117; flex-shrink: 0; }
  .filter-pill:hover { border-color: var(--blue); color: var(--text); }
  .filter-pill.active { border-color: var(--blue); color: var(--blue); background: #0d1f33; }

  /* ── Conditions ── */
  .conditions-scroll { flex: 1; overflow-y: auto; scrollbar-width: thin; scrollbar-color: var(--border) transparent; }

  .cond-header {
    padding: 8px 14px;
    border-bottom: 1px solid var(--border);
    position: sticky;
    top: 0;
    background: var(--surface);
    z-index: 1;
    display: flex;
    flex-direction: column;
    gap: 7px;
  }
  .cond-header-row { display: flex; align-items: center; justify-content: space-between; }

  .cond-search {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-family: inherit;
    font-size: 12px;
    padding: 6px 10px;
    outline: none;
    transition: border-color .15s;
  }
  .cond-search:focus { border-color: var(--blue); }
  .cond-search::placeholder { color: var(--muted); }

  .condition-item {
    padding: 10px 14px;
    border-bottom: 1px solid var(--border);
    transition: background .1s;
    display: flex;
    align-items: center;
    gap: 10px;
    min-height: 52px;
  }
  .condition-item:hover { background: var(--card); }
  .condition-item.active { background: var(--card); border-left: 3px solid var(--accent); padding-left: 11px; }
  .cond-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
  .cond-body { flex: 1; min-width: 0; cursor: pointer; }
  .cond-name { font-size: 12px; font-weight: 500; line-height: 1.35; }
  .cond-meta { display: flex; align-items: center; gap: 8px; margin-top: 3px; }
  .cond-count { font-size: 10px; color: var(--muted); background: var(--bg); border: 1px solid var(--border); border-radius: 10px; padding: 1px 6px; }
  .cond-check { width: 18px; height: 18px; flex-shrink: 0; accent-color: var(--accent); cursor: pointer; }

  /* ── Footer ── */
  .sidebar-footer { padding: 10px 14px; border-top: 1px solid var(--border); display: flex; flex-direction: column; gap: 8px; flex-shrink: 0; }
  .top-row { display: flex; align-items: center; gap: 8px; font-size: 11px; color: var(--muted); }
  .top-row input[type=range] { flex: 1; accent-color: var(--accent); }
  .top-row .top-val { font-size: 12px; font-weight: 600; color: var(--text); min-width: 30px; text-align: right; }
  .btn-row { display: flex; gap: 6px; }
  .btn {
    flex: 1;
    padding: 10px;
    border-radius: 8px;
    border: none;
    font-size: 12px;
    font-weight: 600;
    font-family: inherit;
    cursor: pointer;
    transition: all .15s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 5px;
    min-height: 42px;
    -webkit-tap-highlight-color: transparent;
  }
  .btn:disabled { opacity: .35; cursor: default; }
  .btn-primary { background: var(--accent); color: #fff; }
  .btn-primary:hover:not(:disabled) { background: #c1121f; }
  .btn-secondary { background: var(--card); border: 1px solid var(--border); color: var(--text); }
  .btn-secondary:hover:not(:disabled) { border-color: var(--blue); }

  .total-badge { margin-left: auto; background: var(--bg); border: 1px solid var(--border); border-radius: 10px; padding: 2px 8px; font-size: 11px; color: var(--muted); }
  .total-badge b { color: var(--text); }

  /* ── Map ── */
  #map { width: 100%; height: 100%; }

  /* ── Area filter control ── */
  .area-filter-btn {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 7px 12px;
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    font-family: 'Inter', sans-serif;
    color: var(--muted);
    white-space: nowrap;
    transition: all .15s;
    box-shadow: 0 2px 8px rgba(0,0,0,0.4);
    -webkit-tap-highlight-color: transparent;
  }
  .area-filter-btn:hover { border-color: var(--blue); color: var(--text); }
  .area-filter-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; }

  /* ── Visitor badge ── */
  .visit-badge {
    position: fixed;
    bottom: 28px; right: 10px;
    background: rgba(22,27,34,0.82);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 3px 9px;
    font-size: 10px;
    color: var(--muted);
    backdrop-filter: blur(6px);
    z-index: 400;
    pointer-events: none;
    white-space: nowrap;
  }

  /* ── States ── */
  .empty-state { padding: 28px 16px; text-align: center; color: var(--muted); font-size: 13px; line-height: 1.7; }
  .empty-state .empty-icon { font-size: 32px; margin-bottom: 8px; }
  .loading { display: flex; align-items: center; justify-content: center; gap: 8px; padding: 18px; font-size: 12px; color: var(--muted); }
  .spinner { width: 14px; height: 14px; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin .7s linear infinite; flex-shrink: 0; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* Leaflet popup */
  .leaflet-popup-content-wrapper { background: var(--card); border: 1px solid var(--border); border-radius: 10px; color: var(--text); box-shadow: 0 4px 20px rgba(0,0,0,.5); }
  .leaflet-popup-tip { background: var(--card); }
  .leaflet-popup-content { margin: 10px 14px; font-family: 'Inter', sans-serif; }
  .popup-name { font-weight: 600; font-size: 13px; margin-bottom: 4px; }
  .popup-reward { font-size: 12px; color: var(--blue); margin-bottom: 2px; }
  .popup-cond { font-size: 11px; color: var(--muted); }

  /* ── Mobile ── */
  @media (max-width: 767px) {
    .logo span:not(.logo-icon) { display: none; }

    .city-tab { min-width: 52px; padding: 4px 8px; }
    .city-tab .city-name { font-size: 10px; }

    .main { grid-template-columns: 1fr; position: relative; }

    .sidebar {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      width: 100%;
      height: 72vh;
      border-right: none;
      border-top: 1px solid var(--border);
      border-radius: 18px 18px 0 0;
      transform: translateY(calc(100% - 58px));
      transition: transform 0.3s cubic-bezier(0.32,0.72,0,1);
      z-index: 500;
      box-shadow: 0 -6px 30px rgba(0,0,0,0.5);
    }
    .sidebar.drawer-open { transform: translateY(0); }

    .drawer-handle {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 10px 16px 6px;
      cursor: pointer;
      flex-shrink: 0;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
      min-height: 58px;
      justify-content: center;
    }
    .drawer-pill { width: 36px; height: 4px; background: var(--border); border-radius: 2px; margin-bottom: 7px; }
    .drawer-summary { font-size: 11px; color: var(--muted); font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: calc(100vw - 40px); text-align: center; }

    .visit-badge { bottom: 70px; }
    .cond-check { width: 20px; height: 20px; }
    .condition-item { min-height: 56px; }
    .filter-pills { max-height: 120px; }
  }
</style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-icon">🗺️</div>
    Poké<span>Map</span><span> Route Builder</span>
  </div>
  <div class="city-tabs" id="cityTabs"></div>
</header>

<div class="visit-badge" id="visitBadge" style="display:none">👁 <span id="visitCount">0</span> visitors</div>

<div class="main">
  <div class="sidebar" id="sidebar">

    <div class="drawer-handle" id="drawerHandle">
      <div class="drawer-pill"></div>
      <div class="drawer-summary" id="drawerSummary">Select a city to start</div>
    </div>

    <div class="sidebar-section" id="filterSection">
      <div class="empty-state">
        <div class="empty-icon">🌍</div>
        Select a city to load today's available quests.
      </div>
    </div>

    <div class="conditions-scroll" id="conditionsList"></div>

    <div class="sidebar-footer">
      <div class="top-row">
        <span>Max stops/route</span>
        <input type="range" id="topSlider" min="10" max="300" value="120" step="10">
        <span class="top-val" id="topVal">120</span>
      </div>
      <div class="btn-row">
        <button class="btn btn-primary" id="btnDownload" disabled>⬇ Download GPX</button>
        <button class="btn btn-secondary" id="btnClear" disabled>✕ Clear</button>
      </div>
    </div>

  </div>
  <div id="map"></div>
</div>

<script>
const API = window.location.protocol === 'file:' ? 'http://localhost:8000' : '';
const COLORS = ['#e63946','#58a6ff','#3fb950','#d29922','#bc8cff','#f4a261','#48cae4','#84a98c','#ff6b9d','#ffd166'];

const GROUP_ICONS = {
  coins:      '/sprites/coin.png',
  stardust:   '/sprites/stardust.png',
  items:      '/sprites/poke_ball.png',
  encounters: '/sprites/poke_ball.png',
  mega:       '/sprites/mega_energy.png',
};
const GROUP_EMOJI_FALLBACK = { coins:'💰', stardust:'⭐', items:'🎒', encounters:'🔴', mega:'💜' };

const POGO_ITEM_SPRITES = {
  '1':'/sprites/poke_ball.png','3':'/sprites/ultra_ball.png',
  '301':'/sprites/lucky_egg.png','501':'/sprites/lure_module.png',
  '704':'/sprites/poffin.png','706':'/sprites/golden_razz.png',
  '707':'/sprites/silver_pinap.png','1301':'/sprites/rare_candy.png',
  '1404':'/sprites/star_piece.png',
};

const state = {
  city: null, cityMeta: [],
  filters: [], activeGroup: null, activeSubFilters: [],
  quests: [], conditions: {}, activeCondition: null,
  checkedConditions: new Set(),
  areaFilter: false,
  map: null, layerGroups: {}, routeLayer: null,
};

// ── Init ──────────────────────────────────────────────────────────────────────
async function init() {
  initMap();
  await loadCities();
  startClocks();
  trackVisit();
  initDrawer();
  setInterval(autoRefresh, 2 * 60 * 60 * 1000);
}

async function autoRefresh() {
  if (!state.city) return;
  await loadFilters(state.city);
  if (state.activeSubFilters.length) await fetchAndRender();
}

async function trackVisit() {
  try {
    const res = await fetch(`${API}/api/visit`, { method: 'POST' });
    const { count } = await res.json();
    document.getElementById('visitCount').textContent = count.toLocaleString();
    document.getElementById('visitBadge').style.display = '';
  } catch {}
}

// ── Mobile drawer ─────────────────────────────────────────────────────────────
function initDrawer() {
  const handle = document.getElementById('drawerHandle');
  const sidebar = document.getElementById('sidebar');
  handle.addEventListener('click', () => sidebar.classList.toggle('drawer-open'));
  document.getElementById('map').addEventListener('click', () => sidebar.classList.remove('drawer-open'));
}

function updateDrawerSummary() {
  const el = document.getElementById('drawerSummary');
  if (!state.city) { el.textContent = 'Select a city to start'; return; }
  if (!state.quests.length) { el.textContent = 'Select a reward type above'; return; }
  const checked = state.checkedConditions.size;
  const stops = state.quests.filter(q => state.checkedConditions.has(q.conditions_string)).length;
  el.textContent = checked
    ? `${checked} condition${checked > 1 ? 's' : ''} · ${stops} stops selected`
    : `${state.quests.length} stops · check conditions to select`;
}

// ── Map ───────────────────────────────────────────────────────────────────────
function initMap() {
  state.map = L.map('map', { zoomControl: true }).setView([1.35, 103.82], 12);
  L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
    attribution: '© OpenStreetMap © CARTO', maxZoom: 19,
  }).addTo(state.map);

  // Area filter Leaflet control (top-right)
  const AreaCtrl = L.Control.extend({
    onAdd() {
      const btn = L.DomUtil.create('button', 'area-filter-btn');
      btn.id = 'btnAreaFilter';
      btn.textContent = '⬚ This area only';
      L.DomEvent.disableClickPropagation(btn);
      btn.addEventListener('click', toggleAreaFilter);
      return btn;
    },
  });
  new AreaCtrl({ position: 'topright' }).addTo(state.map);

  state.map.on('moveend', () => {
    if (state.areaFilter && state.quests.length) applyDisplay();
  });
}

// Returns quests filtered to the current map viewport when area filter is on
function getDisplayQuests() {
  if (!state.areaFilter || !state.quests.length) return state.quests;
  const bounds = state.map.getBounds();
  return state.quests.filter(q => bounds.contains([parseFloat(q.lat), parseFloat(q.lng)]));
}

// Re-derive conditions + re-render sidebar from the current display set
function applyDisplay() {
  const dq = getDisplayQuests();
  const conds = {};
  for (const q of dq) {
    const c = q.conditions_string || 'Unknown';
    conds[c] = (conds[c] || 0) + 1;
  }
  state.conditions = conds;
  const badge = document.getElementById('totalBadge');
  if (badge) { badge.style.display=''; document.getElementById('totalNum').textContent = dq.length; }
  renderConditions();
  updateButtons();
  updateDrawerSummary();
}

function toggleAreaFilter() {
  state.areaFilter = !state.areaFilter;
  const btn = document.getElementById('btnAreaFilter');
  btn.classList.toggle('active', state.areaFilter);
  btn.textContent = state.areaFilter ? '⬚ Area: ON' : '⬚ This area only';
  if (state.quests.length) applyDisplay();
}

function plotMarkers() {
  clearMap();
  const condNames = Object.keys(state.conditions);
  for (let ci = 0; ci < condNames.length; ci++) {
    const cond = condNames[ci];
    const color = COLORS[ci % COLORS.length];
    const clusterGroup = L.markerClusterGroup({
      maxClusterRadius: 50,
      iconCreateFunction: cluster => {
        const n = cluster.getChildCount();
        return L.divIcon({
          html: `<div style="background:${color};opacity:0.88;color:#fff;border-radius:50%;width:32px;height:32px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;font-family:Inter,sans-serif;border:2px solid rgba(255,255,255,0.3);box-shadow:0 2px 6px rgba(0,0,0,0.4)">${n}</div>`,
          className: '',
          iconSize: [32, 32],
          iconAnchor: [16, 16],
        });
      },
    }).addTo(state.map);
    state.layerGroups[cond] = { layer: clusterGroup, color };

    for (const q of state.quests.filter(q => q.conditions_string === cond)) {
      L.circleMarker([parseFloat(q.lat), parseFloat(q.lng)], {
        radius: 7, fillColor: color, color: '#fff', weight: 1.5, fillOpacity: 0.9,
      }).bindPopup(`
        <div class="popup-name">${escHtml(q.name || '')}</div>
        <div class="popup-reward">${escHtml(q.rewards_string || '')}</div>
        <div class="popup-cond">${escHtml(cond)}</div>
      `).addTo(clusterGroup);
    }
  }
}

function clearMap() {
  if (state.routeLayer) { state.map.removeLayer(state.routeLayer); state.routeLayer = null; }
  for (const k in state.layerGroups) state.map.removeLayer(state.layerGroups[k].layer);
  state.layerGroups = {};
}

function fitMapToMarkers() {
  const pts = state.quests.map(q => [parseFloat(q.lat), parseFloat(q.lng)]);
  if (pts.length) state.map.fitBounds(L.latLngBounds(pts), { padding: [30, 30] });
}

function updateRoutePreview(pts) {
  if (state.routeLayer) { state.map.removeLayer(state.routeLayer); state.routeLayer = null; }
  if (!pts || pts.length < 2) return;
  state.routeLayer = L.polyline(pts.map(p => [p.lat, p.lng]), {
    color: '#e63946', weight: 2.5, opacity: 0.6, dashArray: '6 8',
  }).addTo(state.map);
}

// ── Cities ────────────────────────────────────────────────────────────────────
async function loadCities() {
  const res = await fetch(`${API}/api/cities`);
  state.cityMeta = await res.json();
  renderCityTabs();
}

function renderCityTabs() {
  const el = document.getElementById('cityTabs');
  el.innerHTML = '';
  for (const c of state.cityMeta) {
    const btn = document.createElement('button');
    btn.className = 'city-tab' + (state.city === c.id ? ' active' : '');
    btn.dataset.id = c.id;
    btn.innerHTML = `<span class="flag">${c.flag}</span><span class="city-name">${c.name}</span><span class="reset" id="reset-${c.id}">--:--</span>`;
    btn.addEventListener('click', () => selectCity(c.id));
    el.appendChild(btn);
  }
}

const CITY_CENTERS = {
  sg:[1.35,103.82], syd:[-33.87,151.21], lon:[51.51,-0.13], nyc:[40.71,-74.01], van:[49.28,-123.12],
};

async function selectCity(id) {
  if (state.city === id) return;
  state.city = id;
  state.activeGroup = null; state.activeSubFilters = [];
  state.quests = []; state.conditions = {}; state.activeCondition = null;
  state.checkedConditions = new Set(); state.areaFilter = false;
  const aBtn = document.getElementById('btnAreaFilter');
  if (aBtn) { aBtn.classList.remove('active'); aBtn.textContent = '⬚ This area only'; }
  document.querySelectorAll('.city-tab').forEach(t => t.classList.toggle('active', t.dataset.id === id));
  clearMap(); renderConditions(); showFilterLoading();
  await loadFilters(id);
  updateButtons(); updateDrawerSummary();
  if (CITY_CENTERS[id]) state.map.setView(CITY_CENTERS[id], 12);
  if (window.innerWidth <= 767) document.getElementById('sidebar').classList.add('drawer-open');
}

// ── Filters ───────────────────────────────────────────────────────────────────
function showFilterLoading() {
  document.getElementById('filterSection').innerHTML =
    '<div class="loading"><div class="spinner"></div> Loading today\'s rewards…</div>';
}

async function loadFilters(city) {
  try {
    const res = await fetch(`${API}/api/filters?city=${city}`);
    state.filters = await res.json();
    renderFilterSection();
  } catch(e) {
    document.getElementById('filterSection').innerHTML =
      `<div class="empty-state"><div class="empty-icon">⚠️</div>${e.message}</div>`;
  }
}

function renderFilterSection() {
  const sec = document.getElementById('filterSection');
  if (!state.filters.length) {
    sec.innerHTML = '<div class="empty-state"><div class="empty-icon">😴</div>No quests found for this city today.</div>';
    return;
  }
  sec.innerHTML = `
    <div style="display:flex;align-items:center;margin-bottom:9px;">
      <div class="section-title" style="margin:0">Reward Type</div>
      <div class="total-badge" id="totalBadge" style="display:none"><b id="totalNum">0</b> stops</div>
    </div>
    <div class="group-tabs" id="groupTabs"></div>
    <div class="filter-pills" id="filterPills"></div>
  `;
  for (const g of state.filters) {
    const btn = document.createElement('button');
    btn.className = 'group-tab';
    btn.dataset.group = g.group;
    const iconUrl = groupIconUrl(g.group);
    const fallback = GROUP_EMOJI_FALLBACK[g.group] || '';
    const iconHtml = iconUrl
      ? `<img class="g-img" src="${iconUrl}" alt="" onerror="this.style.display='none'">`
      : `<span>${fallback}</span>`;
    btn.innerHTML = `${iconHtml}${escHtml(g.label)}`;
    btn.addEventListener('click', () => selectGroup(g.group));
    document.getElementById('groupTabs').appendChild(btn);
  }
}

async function selectGroup(groupId) {
  if (state.activeGroup === groupId) return;
  state.activeGroup = groupId;
  state.activeCondition = null;
  state.checkedConditions = new Set();
  document.querySelectorAll('.group-tab').forEach(b => b.classList.toggle('active', b.dataset.group === groupId));
  const group = state.filters.find(g => g.group === groupId);
  const pillsEl = document.getElementById('filterPills');
  pillsEl.innerHTML = '';
  state.activeSubFilters = group.options.map(o => o.code);

  for (const opt of group.options) {
    const pill = makePill(opt.code, opt.image || null, opt.label, true, false);
    pill.addEventListener('click', () => togglePill(opt.code, group));
    pillsEl.appendChild(pill);
  }
  await fetchAndRender();
}

function makePill(code, image, label, active, isAll) {
  const pill = document.createElement('button');
  pill.className = 'filter-pill' + (active ? ' active' : '') + (isAll ? ' pill-all' : '');
  pill.dataset.code = code;
  let iconHtml = '';
  if (image) {
    const url = getSpriteUrl(image);
    if (url) iconHtml = `<img src="${url}" alt="" onerror="this.style.display='none'">`;
  }
  pill.innerHTML = `${iconHtml}<span>${escHtml(label)}</span>`;
  return pill;
}

function getSpriteUrl(image) {
  if (!image) return null;
  if (image.startsWith('quest_pokemon_')) {
    const id = image.replace('quest_pokemon_', '').split('-')[0];
    return `https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/${id}.png`;
  }
  if (image.startsWith('quest_item_')) {
    const id = image.replace('quest_item_', '').split('-')[0];
    const path = POGO_ITEM_SPRITES[id];
    return path ? `${API}${path}` : null;
  }
  return null;
}

function groupIconUrl(group) {
  const path = GROUP_ICONS[group];
  return path ? `${API}${path}` : null;
}

function togglePill(code, group) {
  const idx = state.activeSubFilters.indexOf(code);
  if (idx === -1) state.activeSubFilters.push(code);
  else state.activeSubFilters.splice(idx, 1);
  document.querySelector(`.filter-pill[data-code="${CSS.escape(code)}"]`)
    ?.classList.toggle('active', idx === -1);
  fetchAndRender();
}

// ── Quest fetch ───────────────────────────────────────────────────────────────
async function fetchAndRender() {
  if (!state.activeSubFilters.length) { clearMap(); renderConditions(); return; }
  document.getElementById('conditionsList').innerHTML =
    '<div class="loading"><div class="spinner"></div> Fetching quests…</div>';
  clearMap();

  const params = new URLSearchParams({ city: state.city });
  for (const code of state.activeSubFilters) params.append('filter', code);
  const group = state.filters.find(g => g.group === state.activeGroup);
  params.set('label', group ? group.label : 'Quest');

  try {
    const res = await fetch(`${API}/api/quests?${params}`);
    const data = await res.json();

    // Client-side filter: pokemap APIs sometimes ignore the id/amount in the filter code
    const parsed = state.activeSubFilters.map(code => { const [t,amt,id]=code.split(','); return {t,amt,id}; });
    state.quests = (data.quests || []).filter(q =>
      parsed.some(f => {
        if (String(q.rewards_types) !== f.t) return false;
        if (f.id && f.id !== '0' && String(q.rewards_ids) !== f.id) return false;
        if (f.amt && f.amt !== '0' && String(q.rewards_amounts) !== f.amt) return false;
        return true;
      })
    );
    state.conditions = {};
    for (const q of state.quests) {
      const c = q.conditions_string || 'Unknown';
      state.conditions[c] = (state.conditions[c] || 0) + 1;
    }

    const badge = document.getElementById('totalBadge');
    if (badge) { badge.style.display=''; document.getElementById('totalNum').textContent = state.quests.length; }
    renderConditions();
    plotMarkers();
    updateButtons();
    fitMapToMarkers();
    updateDrawerSummary();
  } catch(e) {
    document.getElementById('conditionsList').innerHTML =
      `<div class="empty-state"><div class="empty-icon">⚠️</div>${e.message}</div>`;
  }
}

// ── Conditions list ───────────────────────────────────────────────────────────
function renderConditions() {
  const el = document.getElementById('conditionsList');
  const conds = Object.entries(state.conditions);
  if (!conds.length) {
    el.innerHTML = '<div class="empty-state"><div class="empty-icon">🔍</div>No quests found.<br>Try a different filter or city.</div>';
    return;
  }

  el.innerHTML = '';
  const hdr = document.createElement('div');
  hdr.className = 'cond-header';
  hdr.innerHTML = `
    <div class="cond-header-row">
      <span class="section-title" style="margin:0">${conds.length} Quest Condition${conds.length>1?'s':''}</span>
    </div>
    <input type="text" class="cond-search" id="condSearch" placeholder="Search conditions…">
  `;
  el.appendChild(hdr);
  hdr.querySelector('#condSearch').addEventListener('input', function() {
    const q = this.value.toLowerCase();
    el.querySelectorAll('.condition-item').forEach(item =>
      item.style.display = (item.dataset.cond||'').toLowerCase().includes(q) ? '' : 'none'
    );
  });

  conds.forEach(([cond, count], ci) => {
    const color = COLORS[ci % COLORS.length];
    const item = document.createElement('div');
    item.className = 'condition-item' + (state.activeCondition === cond ? ' active' : '');
    item.dataset.cond = cond;
    const checked = state.checkedConditions.has(cond);
    item.innerHTML = `
      <input type="checkbox" class="cond-check" data-cond="${escAttr(cond)}" ${checked ? 'checked' : ''}>
      <div class="cond-dot" style="background:${color}"></div>
      <div class="cond-body">
        <div class="cond-name">${escHtml(cond)}</div>
        <div class="cond-meta"><span class="cond-count">${count} stops</span></div>
      </div>
    `;
    item.querySelector('.cond-check').addEventListener('change', e => {
      e.stopPropagation();
      if (e.target.checked) state.checkedConditions.add(cond);
      else state.checkedConditions.delete(cond);
      updateButtons();
      updateDrawerSummary();
    });
    item.querySelector('.cond-body').addEventListener('click', () => selectCondition(cond));
    el.appendChild(item);
  });
}

function selectCondition(cond) {
  state.activeCondition = state.activeCondition === cond ? null : cond;
  document.querySelectorAll('.condition-item').forEach(el =>
    el.classList.toggle('active', el.dataset.cond === state.activeCondition));
  for (const [c, { layer }] of Object.entries(state.layerGroups)) {
    (state.activeCondition === null || c === state.activeCondition)
      ? state.map.addLayer(layer) : state.map.removeLayer(layer);
  }
  if (state.activeCondition) {
    const pts = state.quests.filter(q => q.conditions_string === state.activeCondition)
      .map(q => [parseFloat(q.lat), parseFloat(q.lng)]);
    if (pts.length) state.map.fitBounds(L.latLngBounds(pts), { padding: [30, 30] });
  }
}

// ── Route optimization (client-side) ─────────────────────────────────────────
function hvs(lat1, lng1, lat2, lng2) {
  const R=6371, r=Math.PI/180;
  const dlat=(lat2-lat1)*r, dlng=(lng2-lng1)*r;
  const a=Math.sin(dlat/2)**2+Math.cos(lat1*r)*Math.cos(lat2*r)*Math.sin(dlng/2)**2;
  return R*2*Math.asin(Math.sqrt(a));
}

function nearestNeighbor(pts) {
  if (!pts.length) return pts;
  const rem = pts.map((_,i)=>i);
  const start = rem.reduce((a,b)=>pts[a].lat<pts[b].lat?a:b);
  const route = [start];
  rem.splice(rem.indexOf(start),1);
  while (rem.length) {
    const last = route[route.length-1];
    const near = rem.reduce((a,b)=>
      hvs(pts[last].lat,pts[last].lng,pts[a].lat,pts[a].lng)<=
      hvs(pts[last].lat,pts[last].lng,pts[b].lat,pts[b].lng)?a:b);
    route.push(near);
    rem.splice(rem.indexOf(near),1);
  }
  return route.map(i=>pts[i]);
}

function trimToCentroid(pts, n) {
  if (pts.length<=n) return pts;
  const clat=pts.reduce((s,p)=>s+p.lat,0)/pts.length;
  const clng=pts.reduce((s,p)=>s+p.lng,0)/pts.length;
  return [...pts].sort((a,b)=>hvs(clat,clng,a.lat,a.lng)-hvs(clat,clng,b.lat,b.lng)).slice(0,n);
}

function routeDistance(pts) {
  let d=0;
  for (let i=1;i<pts.length;i++) d+=hvs(pts[i-1].lat,pts[i-1].lng,pts[i].lat,pts[i].lng);
  return d;
}

function computeRoute() {
  const top = parseInt(document.getElementById('topSlider').value);
  let pts = getDisplayQuests()
    .filter(q=>state.checkedConditions.has(q.conditions_string))
    .map(q=>({lat:parseFloat(q.lat),lng:parseFloat(q.lng),name:q.name||'',cond:q.conditions_string||''}));
  if (!pts.length) return [];
  return nearestNeighbor(trimToCentroid(pts, top));
}

function buildGpx(title, waypoints) {
  const esc = s=>String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  return [
    '<?xml version="1.0" encoding="UTF-8"?>',
    '<gpx version="1.1" creator="PokéMap Route Builder" xmlns="http://www.topografix.com/GPX/1/1">',
    `  <metadata><name>${esc(title)}</name></metadata>`,
    ...waypoints.map(w=>`  <wpt lat="${w.lat}" lon="${w.lng}"><name>${esc(w.name)}</name><desc>${esc(w.cond)}</desc></wpt>`),
    '</gpx>',
  ].join('\n');
}

function downloadSelectedGpx() {
  const pts = computeRoute();
  if (!pts.length) return;
  const label = state.filters.find(g=>g.group===state.activeGroup)?.label || 'Quest';
  const condList = [...state.checkedConditions];
  const title = condList.length===1
    ? `${label} — ${condList[0]}`
    : `${label} (${condList.length} conditions, ${pts.length} stops)`;
  const slug = label.toLowerCase().replace(/[^a-z0-9]+/g,'_').replace(/^_|_$/g,'').slice(0,30);
  const blob = new Blob([buildGpx(title,pts)], { type:'application/gpx+xml' });
  const url = URL.createObjectURL(blob);
  Object.assign(document.createElement('a'),{href:url,download:`pokemap_${slug}.gpx`}).click();
  URL.revokeObjectURL(url);
}

// ── Controls ──────────────────────────────────────────────────────────────────
function updateButtons() {
  const selectedStops = getDisplayQuests().filter(q=>state.checkedConditions.has(q.conditions_string)).length;
  const btnDl = document.getElementById('btnDownload');

  if (selectedStops > 0) {
    const pts = computeRoute();
    const km = routeDistance(pts);
    const dist = km < 1 ? `${Math.round(km*1000)}m` : `${km.toFixed(1)}km`;
    btnDl.textContent = `⬇ GPX · ${pts.length} stops · ${dist}`;
    updateRoutePreview(pts);
  } else {
    btnDl.textContent = '⬇ Download GPX';
    updateRoutePreview(null);
  }

  btnDl.disabled = selectedStops === 0;
  document.getElementById('btnClear').disabled = state.quests.length === 0;
}

document.getElementById('topSlider').addEventListener('input', function() {
  document.getElementById('topVal').textContent = this.value;
  if (state.checkedConditions.size > 0) updateButtons();
});
document.getElementById('btnDownload').addEventListener('click', downloadSelectedGpx);
document.getElementById('btnClear').addEventListener('click', () => {
  state.activeGroup=null; state.activeSubFilters=[];
  state.quests=[]; state.conditions={}; state.activeCondition=null;
  state.checkedConditions=new Set();
  clearMap(); renderConditions(); updateButtons();
  document.querySelectorAll('.group-tab').forEach(b=>b.classList.remove('active'));
  const fp=document.getElementById('filterPills'); if(fp) fp.innerHTML='';
  const badge=document.getElementById('totalBadge'); if(badge) badge.style.display='none';
  updateDrawerSummary();
});

// ── Clocks ────────────────────────────────────────────────────────────────────
function startClocks() { updateClocks(); setInterval(updateClocks,60000); }
function updateClocks() {
  for (const c of state.cityMeta) {
    const el = document.getElementById(`reset-${c.id}`);
    if (!el) continue;
    try {
      const now = new Date();
      const local = new Date(now.toLocaleString('en-US',{timeZone:c.tz}));
      const midnight = new Date(local); midnight.setHours(24,0,0,0);
      const diff = midnight-local;
      const h=Math.floor(diff/3600000), m=Math.floor((diff%3600000)/60000);
      el.textContent=`${h}h ${m}m`;
      el.className='reset'+(h<1?' very-soon':h<3?' soon':'');
    } catch { el.textContent=''; }
  }
}

// ── Utils ─────────────────────────────────────────────────────────────────────
const escHtml = s=>String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
const escAttr = s=>String(s).replace(/"/g,'&quot;');

init();
</script>
