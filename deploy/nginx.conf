## Drop any request that doesn't use the correct hostname (blocks raw IP access)
server {
    listen 80 default_server;
    listen 443 ssl default_server;
    server_name _;
    ssl_certificate     /etc/letsencrypt/live/pokemap.duckdns.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/pokemap.duckdns.org/privkey.pem;
    return 444;
}

## Redirect plain HTTP to HTTPS
server {
    listen 80;
    server_name pokemap.duckdns.org;
    return 301 https://$host$request_uri;
}

## Main HTTPS server
server {
    listen 443 ssl;
    server_name pokemap.duckdns.org;

    ssl_certificate     /etc/letsencrypt/live/pokemap.duckdns.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/pokemap.duckdns.org/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    proxy_read_timeout    60s;
    proxy_connect_timeout 10s;

    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
